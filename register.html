<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="auth-container">
      <h2>Register</h2>
      <input type="text" placeholder="Name" class="input" id="regName" />
      <input type="email" placeholder="Email" class="input" id="regEmail" />
      <input
        type="password"
        placeholder="Password"
        class="input"
        id="regPassword"
      />
      <button class="btn" onclick="register()">Register</button>
    </div>
  </body>
</html>
